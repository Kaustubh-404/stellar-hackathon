<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentPay Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --text: #e0e0e0;
      --dim: #888;
      --accent: #6c5ce7;
      --green: #00b894;
      --blue: #0984e3;
      --orange: #fdcb6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .network {
      background: var(--card);
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--green);
      border: 1px solid var(--border);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.blue { color: var(--blue); }
    .stat-card .value.orange { color: var(--orange); }
    .stat-card .value.accent { color: var(--accent); }

    .section {
      padding: 0 2rem 2rem;
    }
    .section h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 0.8rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--dim);
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    td { font-size: 0.9rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.active { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge.category { background: rgba(108,92,231,0.15); color: var(--accent); }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--dim); }
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--dim);
    }
    .error {
      text-align: center;
      padding: 2rem;
      color: #e17055;
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 1rem; }
      .section { padding: 0 1rem 1rem; }
      .stat-card .value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AgentPay Dashboard</h1>
    <span class="network" id="network">testnet</span>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="label">Total Services</div>
      <div class="value accent" id="totalServices">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Calls</div>
      <div class="value blue" id="totalCalls">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Revenue</div>
      <div class="value green" id="totalRevenue">--</div>
    </div>
    <div class="stat-card">
      <div class="label">On-Chain Receipts</div>
      <div class="value orange" id="totalReceipts">--</div>
    </div>
  </div>

  <div class="section">
    <h2>Registered Services</h2>
    <div id="servicesTable"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <h2>Recent Receipts</h2>
    <div id="receiptsTable"><div class="loading">Loading...</div></div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3100'
      : '/api';

    async function fetchJSON(path) {
      const res = await fetch(`${API}${path}`);
      if (!res.ok) throw new Error(`${res.status}`);
      return res.json();
    }

    function truncate(s, n = 12) {
      if (!s) return '--';
      return s.length > n ? s.slice(0, n) + '...' : s;
    }

    async function loadStats() {
      try {
        const data = await fetchJSON('/api/stats');
        document.getElementById('totalServices').textContent = data.totalServices;
        document.getElementById('totalCalls').textContent = data.totalCalls.toLocaleString();
        document.getElementById('totalRevenue').textContent = data.totalRevenue;
        document.getElementById('totalReceipts').textContent = data.totalReceipts;
        document.getElementById('network').textContent = data.network;
      } catch (e) {
        console.error('Stats error:', e);
      }
    }

    async function loadServices() {
      const el = document.getElementById('servicesTable');
      try {
        const data = await fetchJSON('/api/services');
        if (!data.services.length) {
          el.innerHTML = '<div class="loading">No services registered yet</div>';
          return;
        }
        el.innerHTML = `<table>
          <thead><tr>
            <th>Service</th><th>Category</th><th>Price</th>
            <th>Calls</th><th>Revenue</th><th>Provider</th><th>Status</th>
          </tr></thead>
          <tbody>${data.services.map(s => `<tr>
            <td><strong>${s.serviceId}</strong><br><span class="mono">${s.description || '--'}</span></td>
            <td><span class="badge category">${s.category}</span></td>
            <td>${s.priceUsdc} USDC</td>
            <td>${s.totalCalls.toLocaleString()}</td>
            <td class="mono">${s.totalRevenue.toFixed(4)} USDC</td>
            <td class="mono">${truncate(s.provider)}</td>
            <td><span class="badge active">${s.active ? 'Active' : 'Inactive'}</span></td>
          </tr>`).join('')}</tbody>
        </table>`;
      } catch (e) {
        el.innerHTML = `<div class="error">Failed to load services: ${e.message}</div>`;
      }
    }

    async function loadReceipts() {
      const el = document.getElementById('receiptsTable');
      try {
        const data = await fetchJSON('/api/receipts');
        if (!data.receipts.length) {
          el.innerHTML = '<div class="loading">No receipts yet</div>';
          return;
        }
        el.innerHTML = `<table>
          <thead><tr>
            <th>Receipt</th><th>Service</th><th>Amount</th>
            <th>Payer</th><th>Payee</th><th>Time</th>
          </tr></thead>
          <tbody>${data.receipts.map(r => `<tr>
            <td class="mono">${truncate(r.receiptId, 16)}</td>
            <td>${r.serviceId}</td>
            <td>${r.amountUsdc} USDC</td>
            <td class="mono">${truncate(r.payer)}</td>
            <td class="mono">${truncate(r.payee)}</td>
            <td class="mono">${r.timestamp}</td>
          </tr>`).join('')}</tbody>
        </table>`;
      } catch (e) {
        el.innerHTML = `<div class="error">Failed to load receipts: ${e.message}</div>`;
      }
    }

    // Load all data
    Promise.all([loadStats(), loadServices(), loadReceipts()]);

    // Auto-refresh every 15 seconds
    setInterval(() => {
      loadStats();
      loadServices();
      loadReceipts();
    }, 15000);
  </script>
</body>
</html>
